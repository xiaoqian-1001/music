<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小钱音乐网 | 小杜专属八音盒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .glass-modern {
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.1);
        }
        @keyframes recordRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .record-run {
            animation: recordRotate 18s linear infinite;
        }
        .record-stop {
            animation-play-state: paused;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .song-list::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }
        .song-list::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.8); }
        .lyric-container::-webkit-scrollbar { width: 4px; }
        .lyric-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .lyric-container::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }
        .lyric-container::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.8); }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(168, 85, 247, 0.3);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .custom-play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #ec489a);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.2s ease;
        }
        .custom-play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }
        .custom-play-btn:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.5);
        }
        audio { display: none; }
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3);
            transform: scale(1.01);
        }
        .quality-btn-active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.2s ease;
        }
        .quality-btn-active:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }
        .song-item { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .song-item:hover {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.1));
            transform: translateX(4px);
        }
        .song-playing {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.3), rgba(236, 72, 153, 0.15));
            border-left: 3px solid #a855f7;
        }
        .lyric-line {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255,255,255,0.5);
        }
        .lyric-line.active {
            color: #fff;
            font-size: 1.15rem;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(168, 85, 247, 0.6);
        }
        .vinyl-record {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: #111;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 0 12px #222, 0 0 0 14px #1a1a1a;
        }
        @media (min-width: 768px) {
            .vinyl-record {
                width: 280px;
                height: 280px;
            }
        }
        .vinyl-record::before {
            content: '';
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle,
                #111 0px,
                #111 2px,
                #181818 2px,
                #181818 4px
            );
        }
        .vinyl-cover {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 0 0 10px #000;
        }
        @media (min-width: 768px) {
            .vinyl-cover {
                width: 110px;
                height: 110px;
            }
        }
        .vinyl-center {
            width: 16px;
            height: 16px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec489a);
            transition: width 0.1s linear;
        }
        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            opacity: 0.2;
        }
        @media (prefers-reduced-motion: reduce) {
            .record-run {
                animation: none;
            }
            .song-item,
            .lyric-line,
            .quality-btn-active,
            .custom-play-btn {
                transition: none;
            }
            .custom-play-btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="relative z-10 max-w-6xl mx-auto px-4 py-6 md:py-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-400 via-pink-500 to-purple-400 bg-clip-text text-transparent">
                小钱音乐网
            </h1>
            <p class="text-white/70 mt-2 text-sm sm:text-base">小钱 SVIP 音源 · 无损母带级 · 沉浸聆听</p>
        </div>

        <div class="glass-modern rounded-2xl p-6 mb-6">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <div class="text-white/80 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    音源选择
                </div>
                <button class="px-5 py-2 rounded-full font-semibold text-white quality-btn-active cursor-pointer">
                    小钱 SVIP 音源
                </button>
            </div>
            <div class="flex flex-col md:flex-row gap-4">
                <input v-model="keyword" @keyup.enter="searchMusic" type="text" 
                    placeholder="输入歌名、歌手..." 
                    class="search-input flex-1 pl-4 py-3.5 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 outline-none focus:border-purple-400/50 transition-all duration-200">
                <button @click="searchMusic" :disabled="loading"
                    class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3.5 rounded-xl font-semibold cursor-pointer hover:shadow-lg hover:shadow-purple-500/30 focus:ring-4 focus:ring-purple-500/50 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span v-if="loading" class="loader w-5 h-5 border-2 mr-2 inline-block"></span>
                    {{ loading ? '搜索中' : '搜索音乐' }}
                </button>
            </div>
        </div>

        <!-- 播放区域 + 黑胶唱片 -->
        <div v-if="currentSong" class="glass-card rounded-2xl p-6 md:p-7 mb-6">
            <div class="flex flex-col items-center gap-8">
                <!-- 超大黑胶唱片 -->
                <div class="vinyl-record record-run" :class="isPlaying ? '' : 'record-stop'">
                    <img class="vinyl-cover" :src="currentSong.artwork" @error="currentSong.artwork = defaultCover">
                    <div class="vinyl-center"></div>
                </div>

                <div class="text-center">
                    <span class="inline-block px-3 py-1 rounded-full text-xs sm:text-sm bg-gradient-to-r from-purple-500 to-pink-500 text-white mb-2">
                        小钱 SVIP 专享
                    </span>
                    <h2 class="text-xl sm:text-2xl font-bold text-white">{{ currentSong.title }}</h2>
                    <p class="text-white/70 mt-1 text-sm sm:text-base">{{ currentSong.artist }}</p>

                    <div class="flex justify-center mt-5">
                        <button @click="togglePlay" class="custom-play-btn cursor-pointer" aria-label="播放/暂停">
                            <svg v-if="isPlaying" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                            </svg>
                            <svg v-else class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                </div>
            </div>

            <!-- 播放进度条 -->
            <div class="progress-bar w-full mt-4">
                <div class="progress-bar-fill" :style="{ width: ((audioPlayer?.currentTime || 0) / (audioPlayer?.duration || 1) * 100) + '%' }"></div>
            </div>

            <!-- 秒加载歌词区域 -->
            <div class="mt-8 glass-modern rounded-xl p-4">
                <h3 class="text-white font-semibold mb-3 text-center">歌词</h3>
                <div class="lyric-container h-48 overflow-y-auto text-center space-y-3" ref="lyricContainer">
                    <div v-if="lyrics.length === 0" class="text-white/50">暂无歌词</div>
                    <div v-for="(line, index) in lyrics" 
                        :key="index" class="lyric-line py-1"
                        :class="{ active: currentLyricIndex === index }">
                        {{ line.text }}
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索结果 -->
        <div class="glass-modern rounded-2xl overflow-hidden">
            <div class="px-6 py-5 border-b border-white/10 flex justify-between items-center">
                <span class="text-white font-semibold text-lg">搜索结果</span>
                <span class="text-white/40 text-sm">{{ songs.length }} 首歌曲</span>
            </div>
            <div v-if="loading" class="p-16 text-center">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-white/60">正在寻找音乐...</p>
            </div>
            <div v-else-if="songs.length === 0" class="p-12 sm:p-16 text-center">
                <svg class="empty-state-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                </svg>
                <p class="text-white/60 text-base sm:text-lg">暂无搜索结果</p>
                <p class="text-white/40 text-sm mt-2">试试其他关键词吧</p>
            </div>
            <div v-else class="divide-y divide-white/10 max-h-[550px] overflow-y-auto song-list">
                <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song)"
                    class="song-item p-3 sm:p-4 flex items-center gap-3 sm:gap-4 cursor-pointer"
                    :class="currentSong && currentSong.id === song.id ? 'song-playing' : ''">
                    <div class="text-white/50 w-8 sm:w-10 text-center text-sm sm:text-base">{{ idx+1 }}</div>
                    <img :src="song.artwork" class="w-10 h-10 sm:w-12 sm:h-12 rounded-lg object-cover" @error="song.artwork = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-semibold truncate text-sm sm:text-base">{{ song.title }}</div>
                        <div class="text-white/60 text-xs sm:text-sm truncate">{{ song.artist }}</div>
                    </div>
                </div>
            </div>
        </div>

        <audio ref="audioPlayer" :src="currentPlayUrl" preload="auto" 
            @timeupdate="onTimeUpdate" @canplay="onCanPlay" @error="onPlayError">
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';
        const urlCache = new Map();
        const lyricCache = new Map();
        const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';

        const headers = {
            referer: "httpsy://y.qq.com",
            "user-agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/106.0.0.0 Safari/537.36"
        };

        function formatMusicItem(item) {
            const albummid = item.album?.mid;
            return {
                id: item.id,
                songmid: item.mid,
                title: item.title,
                artist: item.singer?.map(s=>s.name).join("、") || "未知歌手",
                artwork: albummid ? `https://y.gtimg.cn/music/photo_new/T002R800x800M000${albummid}.jpg` : defaultCover
            };
        }

        // 极速歌词解析
        function parseLyric(lrc) {
            if(!lrc) return [];
            const reg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            return lrc.split('\n').map(line=>{
                const m = line.match(reg);
                if(!m) return null;
                const t = parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/1000;
                return {time:t, text:line.replace(reg,"").trim()}
            }).filter(Boolean);
        }

        // 多接口极速并发请求歌词 —— 实现播放瞬间出词
        async function getLyricFast(songmid, title, artist) {
            const key = `${songmid}${title}`;
            if(lyricCache.has(key)) return lyricCache.get(key);
            const tasks = [
                axios.get(`${PROXY}https://oiapi.net/api/QQMusicLyric?songmid=${songmid}`),
                axios.get(`${PROXY}https://lrclib.net/api/search?q=${encodeURIComponent(title+" "+artist)}`)
            ];
            const res = await Promise.allSettled(tasks);
            let raw = "";
            if(res[0].status==="fulfilled" && res[0].value.data?.lyric) raw = res[0].value.data.lyric;
            if(!raw && res[1].status==="fulfilled" && res[1].value.data?.[0]?.syncedLyrics) raw = res[1].value.data[0].syncedLyrics;
            const list = parseLyric(raw);
            lyricCache.set(key, list);
            return list;
        }

        async function getPlayUrl(mid) {
            if(urlCache.has(mid)) return urlCache.get(mid);
            const res = await axios.get(`${PROXY}https://api.xunhuisi.store/API/QQMusic/Song.php?mid=${mid}`);
            if(res.data?.code===200) urlCache.set(mid, res.data.music_url);
            return res.data?.music_url || "";
        }

        async function searchMusic(key) {
            const data = {req_1:{method:"DoSearchForQQMusicDesktop",module:"music.search.SearchCgiService",param:{query:key,num_per_page:25,page_num:1}}};
            const res = await axios.post(`${PROXY}https://u.y.qq.com/cgi-bin/musicu.fcg`, data, {headers});
            return res.data?.req_1?.data?.body?.song?.list?.map(formatMusicItem) || [];
        }

        createApp({
            setup(){
                const keyword = ref("");
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref("");
                const lyrics = ref([]);
                const currentLyricIndex = ref(0);
                const audioPlayer = ref(null);
                const lyricContainer = ref(null);
                const isPlaying = ref(false);

                // 搜索
                const searchMusicFn = async ()=>{
                    if(!keyword.value.trim()) return;
                    loading.value = true;
                    songs.value = await searchMusic(keyword.value);
                    loading.value = false;
                };

                // 播放 + 秒加载歌词
                const playSong = async (song)=>{
                    currentSong.value = song;
                    lyrics.value = [];
                    currentLyricIndex.value = 0;
                    isPlaying.value = false;
                    // 歌词优先并发加载，做到打开就有
                    const lyricP = getLyricFast(song.songmid, song.title, song.artist);
                    const url = await getPlayUrl(song.songmid);
                    currentPlayUrl.value = url;
                    // 直接赋值歌词，不等待，极致提速
                    lyrics.value = await lyricP;
                    nextTick(()=>{
                        if(audioPlayer.value){
                            audioPlayer.value.play().then(()=>isPlaying.value=true);
                        }
                    });
                };

                // 播放暂停
                const togglePlay = ()=>{
                    if(!audioPlayer.value) return;
                    if(isPlaying.value){
                        audioPlayer.value.pause();
                        isPlaying.value = false;
                    }else{
                        audioPlayer.value.play();
                        isPlaying.value = true;
                    }
                };

                // 歌词同步
                const onTimeUpdate = ()=>{
                    if(!lyrics.value.length) return;
                    const t = audioPlayer.value.currentTime;
                    let idx = 0;
                    for(let i=0;i<lyrics.value.length;i++){
                        if(t >= lyrics.value[i].time) idx = i;
                    }
                    currentLyricIndex.value = idx;
                    if(lyricContainer.value){
                        lyricContainer.value.scrollTop = idx * 40 - lyricContainer.value.clientHeight / 2;
                    }
                };

                const onCanPlay = ()=>{};
                const onPlayError = ()=>{};

                return {
                    keyword,songs,loading,currentSong,currentPlayUrl,
                    lyrics,currentLyricIndex,audioPlayer,lyricContainer,isPlaying,
                    defaultCover,searchMusic:searchMusicFn,playSong,togglePlay,
                    onTimeUpdate,onCanPlay,onPlayError
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
