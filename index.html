<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小钱音乐网</title>
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: rgba(255,255,255,0.08);
            --bg-card-hover: rgba(255,255,255,0.13);
            --border: rgba(255,255,255,0.12);
            --border-hover: rgba(255,255,255,0.30);
            --text-primary: #f0f2f8;
            --text-muted: rgba(240,242,248,0.50);
            --accent-teal: #6dd5ed;
            --accent-gold: #e0b97a;
            --accent-purple: #c084fc;
            --radius: 14px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            padding: 58px 14px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 180px;
            opacity: 0.65;
            pointer-events: none;
            z-index: 1;
        }

        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
        }
        @media(min-width:1024px){ .wrap{ max-width:1100px; } }

        .marquee-bar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(13,17,23,0.80);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.09);
            padding: 9px 0;
            overflow: hidden;
            z-index: 200;
        }
        .marquee-track {
            display: flex;
            white-space: nowrap;
            animation: mscroll 20s linear infinite;
        }
        .marquee-track span {
            flex-shrink: 0;
            padding: 0 60px;
            font-size: 11.5px;
            letter-spacing: 0.14em;
            color: var(--accent-gold);
            font-variant-numeric: tabular-nums;
        }
        @keyframes mscroll {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        .header {
            text-align: center;
            padding: 18px 0 28px;
            animation: fadeUp 0.9s var(--ease) both;
        }
        .header-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent-teal);
            margin: 0 auto 18px;
            box-shadow: 0 0 16px var(--accent-teal), 0 0 32px rgba(109,213,237,0.35);
            animation: pulse 2.8s ease infinite;
        }
        @keyframes pulse {
            0%,100% { transform:scale(1); box-shadow:0 0 16px var(--accent-teal),0 0 32px rgba(109,213,237,0.35); }
            50%      { transform:scale(0.6); box-shadow:0 0 5px var(--accent-teal); }
        }
        .page-title {
            font-size: clamp(26px, 5.5vw, 40px);
            font-weight: 800;
            letter-spacing: -0.01em;
            line-height: 1.15;
            background: linear-gradient(120deg, #e0b97a 0%, #f5d9a0 28%, #6dd5ed 58%, #c084fc 82%, #e0b97a 100%);
            background-size: 260% 260%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 7s ease infinite;
            margin-bottom: 4px;
        }
        @keyframes shimmer {
            0%,100% { background-position:0% 50%; }
            50%      { background-position:100% 50%; }
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            animation: fadeUp 0.7s 0.1s var(--ease) both;
        }
        .search-wrap {
            flex: 1;
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        .search-icon svg { width:15px; height:15px; display:block; }
        #search {
            width: 100%;
            padding: 11px 14px 11px 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            backdrop-filter: blur(12px);
        }
        #search::placeholder { color: var(--text-muted); }
        #search:focus {
            border-color: rgba(109,213,237,0.45);
            background: rgba(255,255,255,0.11);
        }

        .no-result {
            display: none;
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        .accordion {
            margin-bottom: 9px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            overflow: hidden;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), background 0.3s, opacity 0.2s;
            animation: fadeUp 0.65s var(--ease) both;
        }
        .accordion:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.10); }
        .accordion.active {
            border-color: rgba(109,213,237,0.32);
            box-shadow: 0 0 0 1px rgba(109,213,237,0.10), 0 14px 45px rgba(0,0,0,0.32);
        }
        .accordion.hidden { display: none; }

        .accordion:nth-child(1){ animation-delay:0.04s; }

        .accordion::before {
            content: '';
            display: block;
            height: 0;
            background: var(--cat-color, var(--accent-teal));
            transition: height 0.35s var(--ease);
            opacity: 0.7;
        }
        .accordion.active::before { height: 2.5px; }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 18px;
            cursor: pointer;
            user-select: none;
            transition: background 0.18s;
        }
        .accordion-header:active { background: rgba(255,255,255,0.04); }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .cat-icon {
            font-size: 18px;
            line-height: 1;
            flex-shrink: 0;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.1));
        }

        .header-label {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.03em;
            color: var(--text-primary);
        }

        .header-right { display: flex; align-items: center; gap: 8px; }
        .badge-count {
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            color: var(--text-muted);
            letter-spacing: 0.03em;
            transition: background 0.2s, color 0.2s;
        }
        .accordion.active .badge-count {
            background: rgba(109,213,237,0.15);
            color: var(--accent-teal);
        }

        .header-arrow {
            flex-shrink: 0;
            color: var(--text-muted);
            transition: transform 0.4s var(--ease), color 0.3s;
        }
        .accordion.active .header-arrow { transform: rotate(180deg); color: var(--accent-teal); }
        .header-arrow svg { width:14px; height:14px; display:block; }

        .accordion-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.42s var(--ease);
        }
        .accordion.active .accordion-body { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .btn-grid {
            padding: 0 12px 12px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 7px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 14px;
            border-radius: 9px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.055);
            color: #eef0f8;
            font-family: inherit;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.02em;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s var(--ease), border-color 0.2s, transform 0.18s var(--ease), box-shadow 0.2s, color 0.18s;
            position: relative;
            overflow: hidden;
            text-align: left;
        }
        .btn-name { flex: 1; }
        .btn-tag {
            font-size: 10.5px;
            padding: 2px 7px;
            border-radius: 12px;
            margin-left: 8px;
            flex-shrink: 0;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .tag-music     { background: rgba(109,213,237,0.15); color: #6dd5ed; }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(109,213,237,0.08) 0%, rgba(192,132,252,0.05) 100%);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(109,213,237,0.38);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.25), 0 0 0 1px rgba(109,213,237,0.12);
            color: #fff;
        }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: translateY(0) scale(0.975); }

        .btn.search-match { border-color: rgba(109,213,237,0.3); }
        .btn.search-hidden { display: none; }

        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(109,213,237,0.20);
            transform: scale(0);
            animation: ripple-anim 0.55s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

        .player-card {
            margin-top: 20px;
            padding: 15px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(18px);
        }
        #audio {
            width: 100%;
            margin-top: 10px;
        }

        .copyright {
            margin-top: 36px;
            padding: 18px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            text-align: center;
            font-size: 11px;
            line-height: 2;
            color: rgba(240,242,248,0.42);
            letter-spacing: 0.05em;
            animation: fadeUp 0.7s 0.5s var(--ease) both;
        }

        .toast {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            padding: 9px 22px;
            border-radius: 40px;
            background: rgba(18,22,30,0.93);
            border: 1px solid rgba(109,213,237,0.32);
            color: var(--accent-teal);
            font-size: 12px;
            letter-spacing: 0.08em;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s, transform 0.22s var(--ease);
            backdrop-filter: blur(20px);
            white-space: nowrap;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="noise"></div>

<div class="marquee-bar">
    <div class="marquee-track">
        <span>小钱音乐网 · 免费无损畅听</span>
        <span>小钱音乐网 · 免费无损畅听</span>
        <span>小钱音乐网 · 免费无损畅听</span>
        <span>小钱音乐网 · 免费无损畅听</span>
    </div>
</div>

<div class="toast" id="toast">✓ 已加载</div>

<div class="wrap">
    <div class="header">
        <div class="header-dot"></div>
        <h1 class="page-title">小钱音乐网</h1>
    </div>

    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg></span>
            <input id="search" type="search" placeholder="搜索歌曲/歌手" autocomplete="off" spellcheck="false">
        </div>
    </div>

    <div class="no-result" id="noResult">🔍 没有找到相关歌曲</div>

    <div class="accordion" style="--cat-color:#6dd5ed" data-id="0">
        <div class="accordion-header">
            <div class="header-left">
                <span class="cat-icon">🎵</span>
                <span class="header-label">搜索结果</span>
            </div>
            <div class="header-right">
                <span class="badge-count" id="resultCount">0</span>
                <div class="header-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="6 9 12 15 18 9"/></svg></div>
            </div>
        </div>
        <div class="accordion-body"><div class="accordion-inner"><div class="btn-grid" id="musicList"></div></div></div>
    </div>

    <div class="player-card">
        <div style="font-size:14px;color:var(--text-muted);text-align:center;">正在播放</div>
        <audio id="audio" controls>
    </div>

    <div class="copyright">
        © 2026 小钱音乐网 &nbsp;|&nbsp; 免费无损音乐<br>
        仅供个人学习交流，勿用于商业用途<br>
        音乐资源来自网络，侵权请联系删除
    </div>
</div>

<script>
/* 极光背景 */
(function() {
    const canvas = document.getElementById('aurora');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0, rafId, paused = false;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    document.addEventListener('visibilitychange', () => {
        paused = document.hidden;
        if (!paused) frame();
    });

    const bands = [
        { color:[80,220,200],  baseY:0.26, amp:0.10, freq:0.55, speed:0.28, width:0.38, alpha:0.22 },
        { color:[160,100,255], baseY:0.36, amp:0.08, freq:0.40, speed:0.20, width:0.30, alpha:0.18 },
        { color:[60,200,255],  baseY:0.20, amp:0.12, freq:0.70, speed:0.35, width:0.26, alpha:0.16 },
        { color:[200,140,255], baseY:0.46, amp:0.07, freq:0.30, speed:0.16, width:0.34, alpha:0.14 },
        { color:[100,240,180], baseY:0.16, amp:0.09, freq:0.60, speed:0.25, width:0.22, alpha:0.14 },
    ];

    function drawBand(b, time) {
        const yC = b.baseY * H + Math.sin(time * b.speed + 1.2) * b.amp * H;
        const bH  = b.width * H;
        const [r,g,bl] = b.color;

        ctx.beginPath();
        for (let i = 0; i <= 120; i++) {
            const x = (i / 120) * W;
            const w = Math.sin(i * b.freq * 0.08 + time * b.speed) * 18
                    + Math.sin(i * b.freq * 0.15 + time * b.speed * 1.3 + 2) * 10
                    + Math.sin(i * b.freq * 0.04 + time * b.speed * 0.7 + 4) * 28;
            i === 0 ? ctx.moveTo(x, yC + w) : ctx.lineTo(x, yC + w);
        }
        ctx.lineTo(W, yC + bH); ctx.lineTo(0, yC + bH); ctx.closePath();

        const g2 = ctx.createLinearGradient(0, yC - bH * 0.3, 0, yC + bH);
        g2.addColorStop(0,   `rgba(${r},${g},${bl},0)`);
        g2.addColorStop(0.2, `rgba(${r},${g},${bl},${b.alpha})`);
        g2.addColorStop(0.55,`rgba(${r},${g},${bl},${b.alpha * 0.55})`);
        g2.addColorStop(1,   `rgba(${r},${g},${bl},0)`);
        ctx.fillStyle = g2;
        ctx.fill();
    }

    function frame() {
        if (paused) return;
        t += 0.008;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        bands.forEach(b => drawBand(b, t));
        ctx.restore();

        const fade = ctx.createLinearGradient(0, H * 0.48, 0, H);
        fade.addColorStop(0, 'rgba(13,17,23,0)');
        fade.addColorStop(1, 'rgba(13,17,23,0.9)');
        ctx.fillStyle = fade;
        ctx.fillRect(0, H * 0.48, W, H * 0.52);

        rafId = requestAnimationFrame(frame);
    }
    frame();
})();

/* 折叠面板 */
document.querySelectorAll('.accordion-header').forEach(header => {
    header.addEventListener('click', () => {
        header.parentElement.classList.toggle('active');
    });
});

/* 音乐搜索与播放 */
const api = "https://api.injahow.cn/music/?type=search&msg=";
const playApi = "https://api.injahow.cn/music/?type=url&id=";

const searchInput = document.getElementById('search');
const musicList = document.getElementById('musicList');
const resultCount = document.getElementById('resultCount');
const noResult = document.getElementById('noResult');
const audio = document.getElementById('audio');
const toast = document.getElementById('toast');

let toastTimer;
function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toast.classList.remove('show'),1500);
}

// 搜索
searchInput.addEventListener('keydown', async (e) => {
    if(e.key !== 'Enter') return;
    const key = searchInput.value.trim();
    if(!key) return showToast('请输入歌曲名');

    try{
        const res = await fetch(api + encodeURIComponent(key));
        const data = await res.json();
        let html = '';
        const list = data.data || [];
        resultCount.textContent = list.length;

        if(list.length === 0){
            noResult.style.display = 'block';
            musicList.innerHTML = '';
            return;
        }
        noResult.style.display = 'none';

        list.forEach(v=>{
            html += `
            <div class="btn" data-id="${v.id}">
                <span class="btn-name">${v.name} - ${v.singer}</span>
                <span class="btn-tag tag-music">音乐</span>
            </div>
            `;
        });
        musicList.innerHTML = html;
        document.querySelector('.accordion').classList.add('active');
        showToast(`找到 ${list.length} 首歌曲`);
    }catch(err){
        showToast('搜索失败，接口异常');
    }
});

// 播放
musicList.addEventListener('click', async (e) => {
    const btn = e.target.closest('.btn');
    if(!btn) return;
    const id = btn.dataset.id;
    if(!id) return;

    // 波纹
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());

    try{
        const res = await fetch(playApi + id);
        const data = await res.json();
        if(!data.url) return showToast('获取播放地址失败');
        audio.src = data.url;
        audio.play();
        showToast('开始播放');
    }catch(err){
        showToast('播放失败');
    }
});
</script>

</body>
</html>
